<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Single Layer Color Swap</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f4f4f4;
            margin: 0;
        }

        .controls {
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            color: white;
            font-weight: bold;
        }

        #displayLayer {
            width: 250px;
            height: 250px;
            background-color: #333; 
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: background-color 0.3s ease;
        }
    </style>
</head>
<body>

    <div class="controls">
        <button style="background: pink;" onclick="updateColor('pink')">Pink</button>
        <button style="background: powderblue;" onclick="updateColor('powderblue')">PowderBlue</button>
        <button style="background: #E0BBE4;"onclick="updateColor('Lavender')">Lavender</button>
    </div>

    <!-- Just one div here -->
    <div id="displayLayer">Click a button</div>

    <script>
        function updateColor(newColor) {
            const layer = document.getElementById('displayLayer');
            
          
            layer.style.backgroundColor = newColor;
            
        
            layer.innerText = newColor.toUpperCase();
        }
    </script>

</body>
</html>
