<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prithvi J K | Portfolio</title>
    <style>
        body {
            /* Using a soft Baby Pink Hex code */
            background-color: #FFD1DC; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .content-box {
            /* Low opacity white/pink blend to make text readable */
            background-color: rgba(255, 255, 255, 0.3); 
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            backdrop-filter: blur(5px); /* Adds a modern frosted glass effect */
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            max-width: 500px;
        }

        h1 { color: #5D5D5D; margin-bottom: 0.2em; }
        h4 { color: #777; margin-top: 0; text-transform: uppercase; letter-spacing: 1px; }
        p { color: #444; line-height: 1.5; }
        
        a {
            color: #D81B60;
            text-decoration: none;
            font-weight: bold;
            border-bottom: 2px solid transparent;
            transition: border-color 0.3s;
        }

        a:hover {
            border-bottom-color: #D81B60;
        }
    </style>
</head>
<body>

    <div class="content-box">
        <h1>Prithvi J K</h1>
        <h4>B.Tech Student</h4>
        
        <p>
            I am pursuing engineering at MITE, currently in my 2nd year. 
            As a CSE student, we are exposed to many languages like 
            C, C++, Python, Java, and many more. 
        </p>

        <h4 style="margin-top: 20px;">Thank you</h4>
        <a href="https://prithvijk.github.io/sem4-fet/">Go to Home Page →</a>
    </div>

</body>
</html>
