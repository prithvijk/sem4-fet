<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prithvi J K | Portfolio</title>
    <style>
        body {
            /* Clean White Background */
            background-color: #FFFFFF; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            /* The "Low Opacity Pink" touch */
            background-color: rgba(255, 182, 193, 0.2); 
            padding: 50px;
            border-radius: 30px;
            text-align: center;
            max-width: 550px;
            /* A soft border to define the shape against the white background */
            border: 1px solid rgba(255, 182, 193, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.02);
        }

        h1 { 
            color: #333; 
            margin-bottom: 10px;
            font-size: 2.5rem;
        }

        h4 { 
            color: #888; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        p { 
            color: #555; 
            line-height: 1.8; 
            font-size: 1.1rem;
        }
        
        .link-style {
            display: inline-block;
            margin-top: 25px;
            color: #FF69B4; /* Hot Pink for the link to pop */
            text-decoration: none;
            font-weight: 600;
            padding: 10px 20px;
            border: 2px solid #FF69B4;
            border-radius: 50px;
            transition: all 0.3s ease;
        }

        .link-style:hover {
            background-color: #FF69B4;
            color: white;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Prithvi J K</h1>
        <h4>B.Tech Student @ MITE</h4>
        
        <p>
            Currently in my 2nd year of CSE, I'm exploring the worlds of 
            <strong>C, C++, Python, and Java</strong>. Guided by our faculty, 
            I'm building a strong foundation in software engineering.
        </p>

        <a href="https://prithvijk.github.io/sem4-fet/" class="link-style">
            View My Home Page
        </a>
    </div>

</body>
</html>
